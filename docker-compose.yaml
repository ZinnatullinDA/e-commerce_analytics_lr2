x-airflow-common:
  &airflow-common
  build:
    context: .
    dockerfile: Dockerfile
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://airflow-webserver:8080/execution/
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: '${FERNET_KEY:-ybimfHzZlbgHg7X_340cHZrsvFQHA1_-Fv7NRqv2Cww=}'
    AIRFLOW__API_AUTH__JWT_SECRET: '${JWT_SECRET:-f4c6e2b8d1a9f3e7c5b2d8f0a4c6e8d1f3a5b7c9d2e4f6a8b1c3d5e7f9a0b1}'
    AIRFLOW__WEBSERVER__SECRET_KEY: '${SECRET_KEY:-f4c6e2b8d1a9f3e7c5b2d8f0a4c6e8d1f3a5b7c9d2e4f6a8b1c3d5e7f9a0b1}'
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__API__AUTH_BACKENDS: 'airflow.providers.fab.auth_manager.api.auth.backend.basic_auth,airflow.providers.fab.auth_manager.api.auth.backend.session'
    AIRFLOW_CONN_CLICKHOUSE_TARGET: 'http://host.docker.internal:8123?user=default&password=1&database=default'
    AIRFLOW_CONN_PG_WAREHOUSE_CONNECTION: 'postgres://postgres:postgres@warehouse-postgres:5432/ecommerce_analytics'
    AIRFLOW_CONN_PG_ORIGIN_BONUS_SYSTEM_CONNECTION: 'postgres://student:student1@rc1a-1kn18k47wuzaks6h.mdb.yandexcloud.net:6432/de-public?sslmode=require'
    DATABASE_URL: 'postgresql+psycopg2://postgres:postgres@warehouse-postgres:5432/ecommerce_analytics'
    SOURCE_FILE: '/opt/airflow/project/online_retail_II.xlsx'
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
    - ./scripts:/opt/airflow/project/scripts
    - ./sql:/opt/airflow/project/sql
    - ./exports:/opt/airflow/project/exports
    - ./online_retail_II.xlsx:/opt/airflow/project/online_retail_II.xlsx
  user: '${AIRFLOW_UID:-50000}:0'

services:
  postgres:
    image: postgres:13-alpine
    ports:
      - "15432:5432"
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 30s
      retries: 3
      start_period: 5s
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M

  warehouse-postgres:
    image: postgres:16
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ecommerce_analytics
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - warehouse-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ecommerce_analytics"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

  airflow-init:
    <<: *airflow-common
    command:
      - bash
      - -c
      - |
        mkdir -p /opt/airflow/dags /opt/airflow/logs /opt/airflow/plugins
        airflow db migrate
        airflow users create \
          --username admin \
          --firstname First \
          --lastname Admin \
          --role Admin \
          --email admin@example.org \
          --password admin || true
    user: '0:0'
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    depends_on:
      postgres:
        condition: service_healthy
      warehouse-postgres:
        condition: service_healthy

  airflow-webserver:
    <<: *airflow-common
    command: api-server
    ports:
      - 8080:8080
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/api/v2/monitor/health"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    depends_on:
      postgres:
        condition: service_healthy
      warehouse-postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://airflow-webserver:8080/api/v2/monitor/health | grep -q 'scheduler.*healthy'"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    depends_on:
      postgres:
        condition: service_healthy
      warehouse-postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  airflow-dag-processor:
    <<: *airflow-common
    command: dag-processor
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://airflow-webserver:8080/api/v2/monitor/health | grep -q 'dag_processor.*healthy'"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    depends_on:
      postgres:
        condition: service_healthy
      warehouse-postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  airflow-triggerer:
    <<: *airflow-common
    command: triggerer
    healthcheck:
      test: ["CMD-SHELL", "airflow triggerer health 2>/dev/null || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    depends_on:
      postgres:
        condition: service_healthy
      warehouse-postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

volumes:
  postgres-db-volume:
  warehouse-db-volume:
